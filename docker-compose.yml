services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - covers_data:/app/miniapp_dist/covers
    environment:
      REDIS_URL: redis://redis:6379/0

  dashboard:
    build: .
    env_file: .env
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  redis_data:
  covers_data:
